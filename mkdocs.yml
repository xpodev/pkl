site_name: PKL - Plugin Hosting System
site_description: A Python plugin system with automatic resource management
site_author: xpodev
site_url: https://xpodev.github.io/pkl

repo_name: xpodev/pkl
repo_url: https://github.com/xpodev/pkl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - autorefs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Core Concepts: getting-started/concepts.md
  - User Guide:
    - Creating Plugins: guide/creating-plugins.md
    - Loading Plugins: guide/loading-plugins.md
    - Resources: guide/resources.md
    - Events: guide/events.md
    - Context & API: guide/context-api.md
    - Lifecycle: guide/lifecycle.md
    - Logging: guide/logging.md
  - API Reference:
    - PluginHost: api/host.md
    - Plugin: api/plugin.md
    - Events: api/events.md
    - Resources: api/resources.md
    - Context: api/context.md
    - Utilities: api/utilities.md
  - Advanced:
    - Custom Loaders: advanced/custom-loaders.md
    - Hooks: advanced/hooks.md
    - Async Support: advanced/async.md
    - Multi-Host: advanced/multi-host.md
  - Examples:
    - Overview: examples/overview.md
    - Basic Plugin: examples/basic.md
    - Events & API: examples/events-api.md
    - Host Events: examples/host-events.md
  - Development:
    - Contributing: development/contributing.md
    - Architecture: development/architecture.md
    - Testing: development/testing.md
